<!DOCTYPE html>
<html>
<head>
<style>
body { background: #0a0e17; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; flex-direction: column; gap: 20px; font-family: sans-serif; }

.loader-logo { position: relative; width: 130px; height: 170px; display: flex; align-items: flex-end; justify-content: center; }

.leaf-group { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); width: 0; height: 0; }

.leaf {
  position: absolute;
  width: 9px;
  height: 26px;
  border-radius: 50% 50% 40% 40%;
  background: linear-gradient(180deg, #ffffff 0%, #aaaaaa 100%);
  transform-origin: bottom center;
  animation: leafBounce 1.6s ease-in-out infinite;
}

@keyframes leafBounce {
  0%   { transform: rotate(var(--r)) translateY(0px) scaleY(1); }
  20%  { transform: rotate(var(--r)) translateY(6px) scaleY(0.85); }
  50%  { transform: rotate(var(--r)) translateY(-14px) scaleY(1.05); }
  75%  { transform: rotate(var(--r)) translateY(-6px) scaleY(0.97); }
  100% { transform: rotate(var(--r)) translateY(0px) scaleY(1); }
}

.leaf:nth-child(1) { --r: 0deg;   left: -4px;  bottom: 0; animation-delay: 0s; }
.leaf:nth-child(2) { --r: 20deg;  left: 9px;   bottom: 0; animation-delay: 0.1s; }
.leaf:nth-child(3) { --r: 38deg;  left: 19px;  bottom: 0; animation-delay: 0.2s; }
.leaf:nth-child(4) { --r: 55deg;  left: 25px;  bottom: 0; animation-delay: 0.3s; }
.leaf:nth-child(5) { --r: 70deg;  left: 27px;  bottom: 0; animation-delay: 0.4s; }
.leaf:nth-child(6) { --r: -20deg; left: -17px; bottom: 0; animation-delay: 0.1s; }
.leaf:nth-child(7) { --r: -38deg; left: -27px; bottom: 0; animation-delay: 0.2s; }
.leaf:nth-child(8) { --r: -55deg; left: -33px; bottom: 0; animation-delay: 0.3s; }
.leaf:nth-child(9) { --r: -70deg; left: -35px; bottom: 0; animation-delay: 0.4s; }

.skull-wrap {
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 4px 20px rgba(255,255,255,0.25));
}

.heartbeat-svg { width: 160px; height: 40px; }
.heartbeat-line {
  fill: none;
  stroke: #06b6d4;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 300;
  stroke-dashoffset: 300;
  animation: drawLine 1.8s ease-in-out infinite;
}
@keyframes drawLine {
  0%   { stroke-dashoffset: 300; opacity: 1; }
  70%  { stroke-dashoffset: 0;   opacity: 1; }
  90%  { stroke-dashoffset: 0;   opacity: 0.3; }
  100% { stroke-dashoffset: 300; opacity: 0; }
}
</style>
</head>
<body>

<div class="loader-logo">
  <div class="leaf-group">
    <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
    <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
    <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
  </div>
  <div class="skull-wrap">
    <svg width="90" height="105" viewBox="0 0 90 105" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#ffffff"/>
          <stop offset="100%" style="stop-color:#c0c0c0"/>
        </linearGradient>
      </defs>

      <!-- Hộp sọ tròn -->
      <ellipse cx="45" cy="40" rx="32" ry="35" fill="url(#sg)"/>

      <!-- Hàm dưới vuông -->
      <path d="M22,65 L22,88 Q22,95 29,95 L61,95 Q68,95 68,88 L68,65 Z" fill="#dddddd"/>
      <line x1="22" y1="75" x2="68" y2="75" stroke="#aaa" stroke-width="0.8" opacity="0.5"/>

      <!-- Răng 4 cái -->
      <rect x="24" y="76" width="8" height="14" rx="2.5" fill="#1a1a2e"/>
      <rect x="35" y="76" width="8" height="14" rx="2.5" fill="#1a1a2e"/>
      <rect x="46" y="76" width="8" height="14" rx="2.5" fill="#1a1a2e"/>
      <rect x="57" y="76" width="8" height="14" rx="2.5" fill="#1a1a2e"/>

      <!-- Mắt hình thoi/hơi lệch - kiểu thổ dân -->
      <ellipse cx="31" cy="38" rx="10" ry="11" fill="#1a1a2e"/>
      <ellipse cx="59" cy="38" rx="10" ry="11" fill="#1a1a2e"/>

      <!-- Vạch xương gò má - nét thổ dân -->
      <line x1="14" y1="48" x2="26" y2="44" stroke="#999" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <line x1="76" y1="48" x2="64" y2="44" stroke="#999" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

      <!-- Vạch trán thổ dân -->
      <path d="M30,18 Q45,14 60,18" stroke="#bbb" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

      <!-- Mũi hình thoi -->
      <path d="M41,53 L45,60 L49,53 L45,50 Z" fill="#1a1a2e"/>

      <!-- Vết nứt trên đầu -->
      <path d="M45,8 L43,20 L47,30 L44,38" stroke="#aaa" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

      <!-- Hoa văn thổ dân 2 bên -->
      <path d="M14,35 Q10,40 14,45" stroke="#bbb" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M76,35 Q80,40 76,45" stroke="#bbb" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    </svg>
  </div>
</div>

<svg class="heartbeat-svg" viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
  <polyline class="heartbeat-line"
    points="0,20 20,20 28,20 33,5 38,35 43,10 48,28 53,20 80,20 88,20 93,5 98,35 103,10 108,28 113,20 160,20"/>
</svg>

</body>
</html>
